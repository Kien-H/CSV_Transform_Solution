<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="32" height="32">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1a5fa8"/>
      <stop offset="100%" stop-color="#0c3d6e"/>
    </linearGradient>
  </defs>

  <!-- 배경 라운드 사각형 -->
  <rect width="32" height="32" rx="7" fill="url(#bg)"/>

  <!-- 파일 아이콘 (뒤) -->
  <rect x="7" y="8" width="12" height="16" rx="1.5" fill="#ffffff" opacity="0.25"/>
  <polygon points="15,8 19,12 15,12" fill="#ffffff" opacity="0.15"/>

  <!-- 파일 아이콘 (앞, 메인) -->
  <rect x="10" y="10" width="13" height="16" rx="1.5" fill="#ffffff"/>
  <polygon points="19,10 23,14 19,14" fill="#b8d4f0"/>
  <rect x="19" y="10" width="4" height="4" rx="0.5" fill="#7ab3e8"/>

  <!-- 화살표 (변환) -->
  <rect x="12.5" y="17" width="7" height="1.5" rx="0.75" fill="#185fa5"/>
  <polygon points="22,17.75 19.5,16 19.5,19.5" fill="#185fa5"/>

  <!-- 하단 줄 -->
  <rect x="12.5" y="20" width="5" height="1.5" rx="0.75" fill="#185fa5" opacity="0.5"/>
</svg>